<!DOCTYPE html5>
<html>
  <head>
    <meta name="title" content="시">
    <meta name="viewport" content="user-scalable=no, initial-scal=1, maximum-scale=1">
    <style>
      html, body {
        font-family:"NanumMyeongjo", "Batang", "Malgun Gothic", serif;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        display: flex;
        justify-content: center;
        overflow: hidden;
      }
      .block {
        border-radius: 20px;
  background: linear-gradient(135deg, #f7fbfc 0%, #d9edf2 40%, #add9e4 100%);
  width: 80%;
  aspect-ratio: 7 / 6;  /* 70:60 비율 유지 */
  max-width: 1000px;
  margin: auto;
      }

      .poet_title {
        text-align: center;
        display: grid;
      }
      .right {
        text-align: right;
      }
      @media screen {
        body {background-color: white;}
      }
      p {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="block">
      <div class="poet">
        <h1 class="poet_title">교목</h1>
        <h4 class="right"> 이육사 &nbsp;&nbsp;</h4>
        <p>
          푸른 하늘에 닿을 듯이<br>
          세월에 불타고 우뚝 남아서서<br>
          차라리 봄도 꽃피진 말아라<br>
          <br>
          낡은 거미집 휘두르고<br>
          끝없는 꿈길에 혼자 설레이는<br>
          마음은 아예 뉘우침 아니리<br>
<br>
          검은 그림자 쓸쓸하면<br>
          마침내 호수 속 깊이 거꾸러져<br>
          차마 바람도 흔들진 못해라<br>
        </p>
      </div>
      
    </div>
  </body>
</html>
